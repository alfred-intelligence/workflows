name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
